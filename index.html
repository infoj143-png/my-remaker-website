<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Remaker Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script type="module" src="https://gradio.s3-us-west-2.amazonaws.com/4.19.2/gradio.js"></script>
    <style>
        /* Custom wrapper to inject dark mode variables into the iframe */
        gradio-app {
            --body-background-fill: #020617;
            --container-background-fill: #0f172a;
            --border-color-primary: #1e293b;
            --button-primary-background-fill: linear-gradient(to right, #7c3aed, #4f46e5);
            --button-primary-text-color: white;
            border-radius: 1rem;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen font-sans flex flex-col">

    <header class="border-b border-slate-800 p-5 text-center bg-slate-950">
        <h1 class="text-3xl font-bold bg-gradient-to-r from-purple-500 to-indigo-500 bg-clip-text text-transparent">
            🤖 AI Remaker Studio
        </h1>
        <p class="text-slate-400 text-sm mt-1">Free Face Swap Dashboard</p>
    </header>

    <main class="flex-1 max-w-5xl w-full mx-auto p-4 md:p-6 flex flex-col justify-center">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-2 shadow-2xl min-h-[650px] flex flex-col">
            
            <gradio-app 
                src="https://Information295-my-remaker-backend.hf.space" 
                theme_mode="dark" 
                initial_height="650px"
                class="w-full flex-1 border-0">
            </gradio-app>

        </div>
    </main>

    <footer class="text-center p-4 text-xs text-slate-600 border-t border-slate-900">
        Powered by Hugging Face & Vercel
    </footer>

</body>
</html>
