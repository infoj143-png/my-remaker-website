<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Remaker Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Responsive container for smooth touch and scroll on mobile devices */
        .iframe-container {
            position: relative;
            width: 100%;
            height: 700px;
            overflow: hidden;
            -webkit-overflow-scrolling: touch;
        }
        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen font-sans flex flex-col">

    <header class="border-b border-slate-800 p-5 text-center bg-slate-950">
        <h1 class="text-3xl font-bold bg-gradient-to-r from-purple-500 to-indigo-500 bg-clip-text text-transparent">
            🤖 AI Remaker Studio
        </h1>
        <p class="text-slate-400 text-sm mt-1">Free Face Swap Dashboard</p>
    </header>

    <main class="flex-1 max-w-4xl w-full mx-auto p-4 md:p-6 flex flex-col justify-center">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-1 shadow-2xl overflow-hidden">
            
            <div class="iframe-container">
                <iframe 
                    src="https://hf.space/embed/Information295/my-remaker-backend/+" 
                    allow="accelerometer; ambient-light-sensor; camera; microphone; gyroscope; geolocation; xr-spatial-tracking; midi; clipboard-write;"
                    sandbox="allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts allow-downloads">
                </iframe>
            </div>

        </div>
    </main>

    <footer class="text-center p-4 text-xs text-slate-600 border-t border-slate-900">
        Powered by Hugging Face Embed & Vercel
    </footer>

</body>
</html>
