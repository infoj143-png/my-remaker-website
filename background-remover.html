<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Background Remover</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-slate-950 text-white min-h-screen">

<header class="border-b border-slate-800 p-5">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
        <h1 class="text-2xl font-bold text-purple-400">
            🖼 AI Background Remover
        </h1>

        <a href="index.html"
           class="bg-slate-800 px-4 py-2 rounded-lg">
            🏠 Home
        </a>
    </div>
</header>

<main class="max-w-5xl mx-auto p-6">

    <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">

        <h2 class="text-xl font-bold mb-4">
            Upload Image
        </h2>

        <input
            type="file"
            id="imageInput"
            accept="image/*"
            class="w-full p-3 bg-slate-950 border border-slate-700 rounded-xl">

        <button
            class="mt-4 w-full bg-purple-600 hover:bg-purple-700 py-3 rounded-xl font-bold">
            Remove Background
        </button>

    </div>

    <div class="mt-8 bg-slate-900 p-6 rounded-2xl border border-slate-800">

        <h2 class="text-xl font-bold mb-4">
            Result
        </h2>

        <div class="bg-slate-950 rounded-xl h-96 flex items-center justify-center">

            <p class="text-slate-500">
                Result image will appear here
            </p>

        </div>

    </div>

</main>

</body>
</html>
